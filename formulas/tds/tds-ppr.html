<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedaya — TDS PPR</title>
  <link rel="stylesheet" href="../../assets/css/shared.css" />
  <style>

    html, body{
      overflow-x:hidden;
    }

    .tds-wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px 20px 90px;
      position:relative;
      z-index:2;
    }

    .tds-hero{
      margin-bottom:20px;
    }

    .tds-hero h2{
      font-size:28px;
      margin:0 0 8px;
      color:#fff;
    }

    .tds-hero p{
      color:rgba(255,255,255,.68);
      line-height:1.8;
      max-width:760px;
      margin:0;
    }

    .slider-shell{
      position:relative;
      margin-top:20px;
      padding:0 64px;
    }

    .slider-viewport{
      overflow:hidden;
      width:100%;
      direction:ltr;
    }

    .slider-track{
      display:flex;
      transition:transform .35s ease;
      will-change:transform;
      touch-action:pan-y;
      direction:ltr;
    }

    .slide{
      min-width:100%;
      box-sizing:border-box;
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
      align-items:stretch;
      padding:4px 0;
      direction:rtl;
    }

    .file-card{
      direction:rtl;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:10px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      backdrop-filter:blur(8px);
      display:flex;
      flex-direction:column;
      min-height:260px;
    }

    .file-thumb{
      width:100%;
      height:150px;
      border-radius:14px;
      background:linear-gradient(135deg,#162032,#0d6b4c);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#e8fff7;
      font-size:24px;
      font-weight:700;
      margin-bottom:10px;
    }

    .file-title{
      color:#fff;
      font-size:14px;
      font-weight:700;
      line-height:1.7;
      margin-bottom:6px;
      word-break:break-word;
    }

    .file-meta{
      color:rgba(255,255,255,.5);
      font-size:11px;
      margin-bottom:12px;
    }

    .file-actions{
      margin-top:auto;
      display:flex;
      gap:8px;
    }

    .file-btn{
      border:none;
      border-radius:12px;
      height:38px;
      cursor:pointer;
      font-family:inherit;
      transition:.2s ease;
      flex:1;
      background:#00c389;
      color:#08110e;
      font-size:12px;
      font-weight:700;
    }

    .file-btn:hover{
      filter:brightness(1.06);
      transform:translateY(-1px);
    }

    .slider-arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:46px;
      height:46px;
      border:none;
      border-radius:50%;
      background:rgba(10,16,24,.92);
      color:#fff;
      font-size:22px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 22px rgba(0,0,0,.2);
      z-index:5;
      transition:.2s ease;
    }

    .slider-arrow:hover:not(:disabled){
      background:rgba(255,255,255,.14);
    }

    .slider-arrow:disabled{
      opacity:.25;
      cursor:not-allowed;
    }

    .slider-arrow.prev{
      left:8px;
      right:auto;
    }

    .slider-arrow.next{
      right:8px;
      left:auto;
    }

    .slider-status{
      text-align:center;
      margin-top:14px;
      color:rgba(255,255,255,.58);
      font-size:12px;
    }

    .tds-loading{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
      color:rgba(255,255,255,.82);
      margin-bottom:14px;
    }

    .tds-spinner{
      width:20px;
      height:20px;
      border:3px solid rgba(255,255,255,.2);
      border-top-color:#00c389;
      border-radius:50%;
      animation:spin .9s linear infinite;
    }

    .tds-empty{
      color:rgba(255,255,255,.72);
      font-size:14px;
      margin-top:8px;
    }

    .tds-modal{
      position:fixed;
      inset:0;
      background:rgba(5,8,12,.76);
      backdrop-filter:blur(10px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
    }

    .tds-modal.active{
      display:flex;
    }

    .tds-modal-box{
      width:min(100%,1000px);
      background:#0f1720;
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .tds-modal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:16px 18px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
    }

    .tds-modal-top h3{
      color:#fff;
      font-size:15px;
      margin:0;
      word-break:break-word;
    }

    .tds-close{
      width:40px;
      height:40px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      cursor:pointer;
    }

    .tds-frame-wrap{
      position:relative;
      width:100%;
      height:75vh;
      background:#000;
      overflow:hidden;
    }

    .tds-frame-wrap iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }

    .tds-overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      background:rgba(0,0,0,.45);
      color:#fff;
      z-index:2;
      transition:.25s ease;
    }

    .tds-overlay.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .tds-overlay-spinner{
      width:42px;
      height:42px;
      border:4px solid rgba(255,255,255,.18);
      border-top-color:#00c389;
      border-radius:50%;
      animation:spin .9s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    @media (max-width:768px){
      .slider-shell{
        padding:0 44px;
      }

      .slide{
        grid-template-columns:1fr;
      }

      .file-card{
        min-height:unset;
      }

      .file-thumb{
        height:170px;
      }

      .slider-arrow{
        width:40px;
        height:40px;
        font-size:20px;
      }
    }

  </style>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <nav>
    <a class="brand-pill" href="../../index.html">
      <div class="nav-title">
        <strong>Bedaya</strong>
        <span>Owned by Mansour Atia</span>
      </div>
    </a>
    <div class="nav-status">Mansour Atia</div>
  </nav>

  <div class="breadcrumb">
    <a href="../../index.html">الرئيسية</a>
    <span>›</span>
    <a href="../index.html">الخلطات</a>
    <span>›</span>
    <span class="current">TDS PPR</span>
  </div>

  <section class="tds-wrap">
    <div class="tds-hero">
      <h2>TDS PPR</h2>
      <p>ملفات TDS الخاصة بخامات وأنظمة الـ PPR.</p>
    </div>

    <div class="slider-shell">
      <div class="tds-loading" id="tdsLoading">
        <div class="tds-spinner"></div>
        <span>جاري جلب الملفات...</span>
      </div>

      <div class="tds-empty" id="tdsEmpty" style="display:none;">
        لا توجد ملفات داخل هذا الفولدر أو حدث خطأ في الجلب.
      </div>

      <button class="slider-arrow prev" id="prevBtn" type="button">‹</button>
      <button class="slider-arrow next" id="nextBtn" type="button">›</button>

      <div class="slider-viewport">
        <div class="slider-track" id="sliderTrack" style="display:none;"></div>
      </div>

      <div class="slider-status" id="sliderStatus" style="display:none;">0 / 0</div>
    </div>
  </section>

  <div class="tds-modal" id="tdsModal">
    <div class="tds-modal-box">
      <div class="tds-modal-top">
        <h3 id="tdsModalTitle">عرض TDS</h3>
        <button class="tds-close" id="closeTdsBtn" type="button">×</button>
      </div>
      <div class="tds-frame-wrap" id="tdsFrameWrap"></div>
    </div>
  </div>

  <footer>Bedaya © 2026 — Owned by Mansour Atia</footer>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztrr8X8b7AqPEmbARoD12bo30lfMRGu3x0bDd75BbA4zqeuj3fN-4RhDbfVXL_DIraZg/exec";
    const FOLDER_ID = "1vfNFyxIGUtYrBWwU48iWhHgDPRrC8TTz";

    const tdsLoading = document.getElementById("tdsLoading");
    const tdsEmpty = document.getElementById("tdsEmpty");
    const sliderTrack = document.getElementById("sliderTrack");
    const sliderStatus = document.getElementById("sliderStatus");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const tdsModal = document.getElementById("tdsModal");
    const tdsModalTitle = document.getElementById("tdsModalTitle");
    const tdsFrameWrap = document.getElementById("tdsFrameWrap");
    const closeTdsBtn = document.getElementById("closeTdsBtn");

    let filesData = [];
    let slides = [];
    let currentIndex = 0;
    let startX = null;

    function getPdfPreviewLink(id){
      return `https://drive.google.com/file/d/${id}/preview`;
    }

    function chunkArray(arr, size){
      const out = [];
      for(let i = 0; i < arr.length; i += size){
        out.push(arr.slice(i, i + size));
      }
      return out;
    }

    function getItemsPerSlide(){
      return window.innerWidth <= 768 ? 1 : 2;
    }

    async function fetchFiles(){
      try{
        const res = await fetch(`${SCRIPT_URL}?folderId=${encodeURIComponent(FOLDER_ID)}`);
        const data = await res.json();

        if(data.status !== "success" || !Array.isArray(data.files)){
          throw new Error("Invalid response");
        }

        filesData = data.files;

        if(!filesData.length){
          tdsLoading.style.display = "none";
          tdsEmpty.style.display = "block";
          prevBtn.style.display = "none";
          nextBtn.style.display = "none";
          return;
        }

        buildSlider();
        tdsLoading.style.display = "none";
        sliderTrack.style.display = "flex";
        sliderStatus.style.display = "block";
        updateSlider();
      }catch(err){
        console.error(err);
        tdsLoading.style.display = "none";
        tdsEmpty.style.display = "block";
        prevBtn.style.display = "none";
        nextBtn.style.display = "none";
      }
    }

    function buildSlider(){
      const itemsPerSlide = getItemsPerSlide();
      slides = chunkArray(filesData, itemsPerSlide);
      sliderTrack.innerHTML = "";

      slides.forEach(group => {
        const slide = document.createElement("div");
        slide.className = "slide";

        group.forEach(file => {
          const card = document.createElement("div");
          card.className = "file-card";
          const cleanName = file.name.replace(/\.pdf$/i, "");

          card.innerHTML = `
            <div class="file-thumb">PDF</div>
            <div class="file-title">${cleanName}</div>
            <div class="file-meta">${file.mimeType || "application/pdf"}</div>
            <div class="file-actions">
              <button class="file-btn" type="button">عرض TDS</button>
            </div>
          `;

          card.querySelector(".file-btn").addEventListener("click", () => openTdsModal(file));
          slide.appendChild(card);
        });

        sliderTrack.appendChild(slide);
      });
    }

    function updateSlider(){
      sliderTrack.style.transform = `translateX(-${currentIndex * 100}%)`;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === slides.length - 1;

      const itemsPerSlide = getItemsPerSlide();
      const from = currentIndex * itemsPerSlide + 1;
      const to = Math.min((currentIndex + 1) * itemsPerSlide, filesData.length);
      sliderStatus.textContent = `${from}-${to} / ${filesData.length}`;
    }

    prevBtn.addEventListener("click", () => {
      if(currentIndex > 0){
        currentIndex--;
        updateSlider();
      }
    });

    nextBtn.addEventListener("click", () => {
      if(currentIndex < slides.length - 1){
        currentIndex++;
        updateSlider();
      }
    });

    sliderTrack.addEventListener("touchstart", e => {
      if(e.touches.length === 1){
        startX = e.touches[0].clientX;
      }
    });

    sliderTrack.addEventListener("touchend", e => {
      if(startX === null) return;
      const endX = e.changedTouches[0].clientX;
      const diff = endX - startX;

      if(diff > 50 && currentIndex > 0){
        currentIndex--;
        updateSlider();
      }else if(diff < -50 && currentIndex < slides.length - 1){
        currentIndex++;
        updateSlider();
      }

      startX = null;
    });

    function openTdsModal(file){
      tdsModalTitle.textContent = file.name.replace(/\.pdf$/i, "");
      tdsFrameWrap.innerHTML = `
        <div class="tds-overlay" id="tdsOverlay">
          <div class="tds-overlay-spinner"></div>
          <div>جاري تحميل ملف الـ TDS...</div>
        </div>
        <iframe id="tdsIframe" src="${getPdfPreviewLink(file.id)}"></iframe>
      `;

      tdsModal.classList.add("active");
      document.body.style.overflow = "hidden";

      const iframe = document.getElementById("tdsIframe");
      const overlay = document.getElementById("tdsOverlay");

      iframe.addEventListener("load", () => {
        setTimeout(() => overlay.classList.add("hidden"), 700);
      });
    }

    function closeTdsModal(){
      tdsModal.classList.remove("active");
      tdsFrameWrap.innerHTML = "";
      document.body.style.overflow = "";
    }

    closeTdsBtn.addEventListener("click", closeTdsModal);

    tdsModal.addEventListener("click", e => {
      if(e.target === tdsModal){
        closeTdsModal();
      }
    });

    document.addEventListener("keydown", e => {
      if(e.key === "Escape" && tdsModal.classList.contains("active")){
        closeTdsModal();
      }
    });

    window.addEventListener("resize", () => {
      if(!filesData.length) return;
      currentIndex = 0;
      buildSlider();
      updateSlider();
    });

    fetchFiles();
  </script>
</body>
</html>
