<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedaya — TDS</title>
  <link rel="stylesheet" href="../../assets/css/shared.css" />
  <style>
    .tds-wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 20px 80px;
      position:relative;
      z-index:2;
    }

    .tds-hero{
      margin-bottom:28px;
    }

    .tds-hero h2{
      font-size:32px;
      margin-bottom:10px;
      color:#fff;
    }

    .tds-hero p{
      color:rgba(255,255,255,.65);
      line-height:1.8;
      max-width:780px;
    }

    .groups-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
      margin-top:22px;
    }

    .group-card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:20px;
      box-shadow:0 16px 40px rgba(0,0,0,.18);
      transition:.25s ease;
      backdrop-filter:blur(8px);
      cursor:pointer;
      text-decoration:none;
      display:block;
    }

    .group-card:hover{
      transform:translateY(-4px);
      border-color:rgba(0,195,137,.35);
      box-shadow:0 22px 46px rgba(0,0,0,.26);
    }

    .group-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:rgba(0,195,137,.12);
      color:#00c389;
      border:1px solid rgba(0,195,137,.22);
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      font-weight:700;
      margin-bottom:14px;
    }

    .group-card h3{
      color:#fff;
      font-size:20px;
      margin-bottom:8px;
      line-height:1.5;
    }

    .group-card p{
      color:rgba(255,255,255,.65);
      font-size:14px;
      line-height:1.8;
      margin-bottom:16px;
      min-height:48px;
    }

    .group-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:14px;
      font-size:13px;
      color:rgba(255,255,255,.6);
      flex-wrap:wrap;
    }

    .group-footer span:last-child{
      font-size:12px;
      color:rgba(255,255,255,.45);
    }

    @media (max-width:768px){
      .tds-hero h2{
        font-size:26px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <nav>
    <a class="brand-pill" href="../../index.html">
      <div class="nav-title">
        <strong>Bedaya</strong>
        <span>Owned by Mansour Atia</span>
      </div>
    </a>
    <div class="nav-status">Mansour Atia</div>
  </nav>

  <div class="breadcrumb">
    <a href="../../index.html">الرئيسية</a>
    <span>›</span>
    <a href="../index.html">الخلطات</a>
    <span>›</span>
    <span class="current">TDS</span>
  </div>

  <section class="tds-wrap">
    <div class="tds-hero">
      <h2>ورقات البيانات التقنية (TDS)</h2>
      <p>
        اختر المجموعة التي تريدها لفتح صفحة مستقلة تعرض ملفات TDS الخاصة بها.
      </p>
    </div>

    <div class="groups-grid" id="groupsGrid"></div>
  </section>

  <footer>Bedaya © 2026 — Owned by Mansour Atia</footer>

  <script>
    const groups = [
      {
        title: "TDS RUBBER",
        description: "ورقات البيانات التقنية لخامات ومنتجات الـ Rubber.",
        folderId: "1yRiz-DLhrP-BItldzshDN0-SepFx7FvG",
        pageUrl: "./tds-rubber.html"
      },
      {
        title: "TDS PVC",
        description: "ملفات TDS الخاصة بخامات وخلطات الـ PVC.",
        folderId: "1j6fhWULNvVt08ivxJSoKaiPHGS-iX910",
        pageUrl: "./tds-pvc.html"
      },
      {
        title: "TDS PPR",
        description: "ملفات TDS لخامات وأنظمة الـ PPR.",
        folderId: "1vfNFyxIGUtYrBWwU48iWhHgDPRrC8TTz",
        pageUrl: "./tds-ppr.html"
      },
      {
        title: "TDS PPH",
        description: "ملفات TDS لخامات وأنظمة الـ PPH.",
        folderId: "1_y6aVB-dgq6Ag6xoGzyUqa-Xk5IIDUx_",
        pageUrl: "./tds-pph.html"
      },
      {
        title: "TDS FILM",
        description: "ملفات TDS الخاصة بخامات الـ Film والتطبيقات المرتبطة.",
        folderId: "1G1TAw4XBV-7inEUkIFZkm51v33kVHXcl",
        pageUrl: "./tds-film.html"
      },
      {
        title: "TDS CEMENT",
        description: "ملفات TDS الخاصة بخامات ومنتجات الـ Cement.",
        folderId: "1yx5D9SqTuU8tFihP4FsJ0ECrNf5NEEoh",
        pageUrl: "./tds-cement.html"
      }
    ];

    const groupsGrid = document.getElementById("groupsGrid");

    groups.forEach(group => {
      const card = document.createElement("a");
      card.className = "group-card";
      card.href = group.pageUrl;

      card.innerHTML = `
        <div class="group-badge">📁 مجموعة TDS</div>
        <h3>${group.title}</h3>
        <p>${group.description}</p>
        <div class="group-footer">
                  </div>
      `;

      groupsGrid.appendChild(card);
    });
  </script>
</body>
</html>
